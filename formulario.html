<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de contacto</title>
</head>
<body>
    <header>
        <a href="Index.html"><i>꧁ Volver al inicio  ꧂</i></a>
        
    </header>
    <main>
        <article>
            <h1><i>¡Compartinos lo que pensás!</i></h1>
        </article>
        <form action="">
    <fieldset >
        <legend ><i>Datos personales</i></legend>
        <br>
        <label for="Nombre" ><i>Nombre:</i></label>
        <input type="text" placeholder="Ingrese nombre" required >
        <br> <br>
        <label for=""><i>Apellido:</i></label>
        <input type="text" placeholder="Ingrese apellido" >
        <br><br>
        <label for=""><i>Celular:</i></label>
        <input type=" "  pattern="[0-9]+" title="Solo números" placeholder="Ingrese número de celular" required> <br><br>
        <label for=""><i>Email:</i></label>
        <input type="email" placeholder="Ingrese email" required >
        <br><br>
        
    </fieldset>
 <br>
    <fieldset >
        <br>
       
        <legend><i>Preferencias</i></legend>

        <label for="parte"><i>¿Te gustó la página?</i></label> <br><br>
        <input type="radio" name="parte" id=""> Si <br>
        <input type="radio" name="parte"> No <br>
        <input type="radio" name="parte"> Puede mejorar<br>
        <input type="radio" name="parte"> Me encantó<br> 
        <hr>
        <label for=""><i>¿Qué parte te gustó más?</i></label> <br><br>
        <input type="checkbox" name="" id=""> La publicidad <br>
        <input type="checkbox" name="" id=""> Los tips <br>
        <input type="checkbox"> Las aplicaciones<br>
        <input type="checkbox"> Las recomendaciones<br>
        <input type="checkbox"> Los consejos para estudiar<br>
    </fieldset>
    <br>
    <fieldset >
        <legend ><i>Opiniones</i></legend>
        <textarea name="" id="" rows="7" cols="14" maxlength="171"
         placeholder="Escriba aquí"> </textarea> 
         <br> <br>

        <input type="submit" value="Enviar" >
        <input type="reset" value="Limpiar">
    </fieldset>
        </form>
        
    </main>
</body>
</html>
