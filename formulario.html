<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de contacto</title>
</head>
<body>
    <header>
        <ul>
            <li><a href="Index.html">Volver al inicio</a></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
        </ul>
        
    </header>
    <main>
        <form action="">
    <fieldset >
        <legend >Datos personales</legend>
        <br>
        <label for="Nombre" >Nombre:</label>
        <input type="text" placeholder="Ingrese nombre" required >
        <br> <br>
        <label for="">Apellido:</label>
        <input type="text" placeholder="Ingrese apellido" >
        <br><br>
        <label for="">Email</label>
        <br>
        <input type="email" placeholder="Ingrese email" required >
        <br><br>
        
    </fieldset>
 <br>
    <fieldset >
        <br>
        <legend>Preferencias</legend>
        <label for="preferencias">¿Te gustó la página?</label>
        <br>
        <select name="elegir" id="">
            <option value="Si">Si</option>
            <option value="No">No</option>
            <option value="Puede mejorar">Puede mejorar</option>
            <option value="Me encantó">Me encantó</option>
            <option value="No me gustó nada">No me gustó nada</option>
        </select> <br> <br>

        <label for="parte">¿Qué parte te gustó más?</label> <br>
        <input type="radio" name="parte" id=""> Online <br>
        <input type="radio" name="parte"> Presencial <br><br>
        
        <label for="">Intereses:</label> <br>
        <input type="checkbox" name="" id=""> Diseño <br>
        <input type="checkbox" name="" id=""> Programación <br>
        <input type="checkbox"> Base de Datos <br>
    </fieldset>
    <br>
    <fieldset >
        <legend >Comentarios</legend>
        <textarea name="" id="" rows="3" cols="7" maxlength="171"
         placeholder="Escriba aquí"> </textarea> <br> <br>
        <input type="submit" value="Enviar" >
        <input type="reset" value="Limpiar">
    </fieldset>
   </form>
        
    </main>
</body>
</html>
